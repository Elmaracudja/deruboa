<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deruboa</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
  <script src="./script.js" defer></script>
</head>
<body>
  <main class="page">
    <section class="intro">
      <p class="intro-text">
        Voici les réalisations vidéos d'EKWallegory Prod pour E.M. 101 Webradio,
        documentaires, reportages, clips, magazines, publicités, etc...
      </p>
    </section>

    <section class="player-panel">
      <div class="video-wrap">
        <video
          id="player"
          controls
          autoplay
          muted
          playsinline
          preload="metadata"
          controlslist="nodownload noremoteplayback"
          disablepictureinpicture
          oncontextmenu="return false;"
        >
          Votre navigateur ne prend pas en charge la lecture vidéo HTML5.
        </video>
      </div>

      <div class="meta">
        <p class="label">Lecture en cours</p>
        <h1 id="video-title">Chargement…</h1>
        <p id="video-file" class="file-name">Préparation de la playlist…</p>

        <label class="loop-toggle" for="playlist-loop">
          <input type="checkbox" id="playlist-loop" />
          <span>Loop playlist</span>
        </label>
      </div>
    </section>
  </main>
</body>
</html>
